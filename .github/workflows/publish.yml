name: Publish

# Publishes the Converj package to nuget.org when a version tag is pushed, e.g.:
#   git tag v2.0.0 && git push origin v2.0.0
# Requires a repository secret named NUGET_API_KEY.

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Fail fast before building if the tag isn't a valid NuGet version (e.g. 'vfoo'
      # or 'v2.1' would otherwise pack a garbage or partial version). Matches
      # MAJOR.MINOR.PATCH with optional -prerelease and +build metadata.
      - name: Validate tag is a version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' does not yield a valid NuGet version ('${VERSION}'). Expected MAJOR.MINOR.PATCH, e.g. v2.1.0."
            exit 1
          fi
          echo "Publishing version ${VERSION}"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for SourceLink

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      # No --no-build: Converj.csproj packs with IncludeBuildOutput=false and a custom
      # BuildDependenciesBeforePack target that invokes Build, which conflicts with NoBuild.
      # The version comes from the tag (v2.1.0 -> 2.1.0), making the git tag the single
      # source of truth so the package version can never drift from what triggered the run.
      - name: Pack
        run: >
          dotnet pack src/Converj/Converj.csproj --configuration Release
          -p:Version="${GITHUB_REF_NAME#v}"
          --output ${{ runner.temp }}/nupkg

      - name: Push to nuget.org
        run: >
          dotnet nuget push "${{ runner.temp }}/nupkg/*.nupkg"
          --source https://api.nuget.org/v3/index.json
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --skip-duplicate
